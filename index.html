<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas Isolados - Interativo</title>
    <!-- Inclusão da biblioteca Chart.js para os gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333;
            --accent-color: #1a73e8;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #map-container {
            flex: 1;
            position: relative;
            background-color: #e9ecef;
            overflow: hidden;
            min-width: 0;
        }

        #svg-viewport {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            cursor: grab;
            user-select: none;
            touch-action: none;
        }

        #svg-viewport.dragging {
            cursor: grabbing;
        }

        #svg-wrapper {
            position: absolute;
            left: 50%;
            top: 50%;
            will-change: transform;
        }

        #svg-wrapper svg {
            display: block;
            background: white;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.1);
            max-width: none;
            max-height: none;
            overflow: visible;
        }

        #loading-text {
            margin: 0;
            transform: translate(-50%, -50%);
            position: absolute;
            top: 50%;
            left: 50%;
            color: #666;
            font-size: 16px;
        }

        .interactive-element {
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .interactive-element:hover {
            filter: drop-shadow(2px 4px 6px rgba(0, 86, 179, 0.6)) brightness(0.85);
        }

        #info-panel {
            width: 360px;
            max-width: min(360px, 95vw);
            background: var(--card-bg);
            border-left: 2px solid #ddd;
            padding: 20px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.35s ease;
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            z-index: 10;
            /* Garante a rolagem se o conteúdo ultrapassar a altura da tela */
            overflow-y: auto;
            overflow-x: hidden;
        }

        #info-panel.active {
            transform: translateX(0);
        }

        .panel-header {
            border-bottom: 2px solid var(--primary-color);
            margin-bottom: 15px;
            padding-bottom: 10px;
            flex-shrink: 0;
        }

        .panel-header h2 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--primary-color);
        }

        .data-row {
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .data-label {
            font-size: 0.75rem;
            color: #666;
            font-weight: bold;
        }

        .data-value {
            font-size: 0.95rem;
            color: var(--text-color);
            margin-top: 2px;
            word-break: break-word;
        }

        .close-btn {
            align-self: flex-end;
            background: #eee;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 15px;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .close-btn:hover { background: #ddd; }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-top: 5px;
        }

        #chart-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            display: none;
            flex-shrink: 0; /* Impede que o gráfico encolha */
        }

        #pressureChart {
            height: 200px !important;
            width: 100% !important;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .chart-header h3 {
            font-size: 0.9rem;
            margin: 0;
            color: #555;
        }

        .chart-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            color: #666;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: #f0f0f0;
            color: var(--primary-color);
        }

        /* --- CONTROLE DE TAMANHO DA IMAGEM --- */
        #image-container {
            width: 100%;
            height: 180px; 
            min-height: 180px; /* Garante que não encolha verticalmente */
            background-color: #eee;
            overflow: hidden;
            display: none;
            border-radius: 8px;
            margin-top: 20px;
            margin-bottom: 10px;
            flex-shrink: 0; /* Impede o flexbox de achatar a imagem */
        }

        #item-imagem {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        /* Modal do Gráfico Ampliado */
        #chart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            width: 95vw;          
            height: 85vh;         
            max-width: 1400px;    
            border-radius: 12px;
            padding: 25px;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-shrink: 0; 
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.4rem;
            color: var(--primary-color);
        }

        #modal-canvas-container {
            flex: 1;            
            width: 100%;
            height: 100%;
            min-height: 0;      
            position: relative;
        }

        #expandedChart {
            width: 100% !important;
            height: 100% !important;
        }

        .modal-close {
            background: #eee;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        
        .modal-close:hover { background: #ddd; }

        @keyframes blinker {
            50% { opacity: 0.4; fill: #ff4d4d; }
        }

        .highlight-blink {
            animation: blinker 0.8s ease-in-out infinite;
            stroke: #ff0000 !important;
            stroke-width: 3px !important;
        }

        .error-box {
            color: #b00020;
            background: #ffe8e8;
            border: 1px solid #ffb3b3;
            padding: 16px;
            margin: 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div id="map-container">
    <div id="svg-viewport">
        <div id="svg-wrapper">
            <p id="loading-text">A carregar o mapa e dados...</p>
        </div>
    </div>
</div>

<div id="info-panel">
    <button class="close-btn" onclick="closePanel()">Fechar ✕</button>

    <div class="panel-header">
        <h2 id="item-nome">Componente</h2>
        <span id="item-status" class="status-badge">Status</span>
    </div>

    <div class="data-row">
        <div class="data-label">Nomenclatura</div>
        <div id="item-id" class="data-value">-</div>
    </div>

    <div id="campos-dinamicos"></div>

    <!-- Container de Imagem movido para ANTES do gráfico -->
    <div id="image-container">
        <img id="item-imagem" src="" alt="Foto do Equipamento">
    </div>

    <!-- Seção do Gráfico no Painel Lateral -->
    <div id="chart-section">
        <div class="chart-header">
            <h3>Histórico de Dados</h3>
            <div class="chart-actions">
                <button class="icon-btn" onclick="baixarGrafico()" title="Baixar PNG">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4M7 10l5 5 5-5M12 15V3"/></svg>
                </button>
                <button class="icon-btn" onclick="abrirModalGrafico()" title="Ampliar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                </button>
            </div>
        </div>
        <canvas id="pressureChart"></canvas>
    </div>
</div>

<!-- Modal de Ampliação -->
<div id="chart-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-title">Histórico Detalhado</h2>
            <div style="display: flex; gap: 10px;">
                <button class="icon-btn" onclick="baixarGrafico(true)" style="background: #f0f0f0; padding: 5px 12px; border-radius: 6px;" title="Baixar PNG">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4M7 10l5 5 5-5M12 15V3"/></svg>
                    <span style="margin-left: 8px; font-size: 0.85rem; font-weight: 600;">Baixar PNG</span>
                </button>
                <button class="modal-close" onclick="fecharModalGrafico()">✕</button>
            </div>
        </div>
        <div id="modal-canvas-container">
            <canvas id="expandedChart"></canvas>
        </div>
    </div>
</div>

<script>
    const panel = document.getElementById('info-panel');
    const svgWrapper = document.getElementById('svg-wrapper');
    const svgViewport = document.getElementById('svg-viewport');
    const chartSection = document.getElementById('chart-section');
    const modal = document.getElementById('chart-modal');
    const imgContainer = document.getElementById('image-container');
    const imgElement = document.getElementById('item-imagem');
    
    const svgFileName = 'VCP2 1.svg';
    const csvFileName = 'consolidado_monitoramento.csv';

    let scale = 1;
    let isDragging = false;
    let startX = 0, startY = 0;
    let lastTranslateXPx = 0, lastTranslateYPx = 0;
    
    let currentChart = null;
    let expandedChart = null;
    let lastChartData = null;

    // --- FUNÇÕES DE DADOS ---

    async function atualizarGrafico(nomenclatura, nomMacro) {
        if (!nomenclatura && !nomMacro) return;
        try {
            const response = await fetch(csvFileName);
            if (!response.ok) throw new Error("Erro ao carregar CSV");
            
            const text = await response.text();
            const lines = text.split('\n');
            
            // Usaremos um objeto para agrupar os dados por tempo e garantir alinhamento
            const groupedData = {};

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                const cols = line.split(';'); 
                if (cols.length < 5) continue;

                const tagCsv = cols[0].trim();
                const vrpCsv = cols[1].trim();
                const caracteristica = cols[2].trim();
                const tempo = cols[3].trim();
                // Converte valor tratando a vírgula decimal
                const valor = parseFloat(cols[4].replace(',', '.'));

                // Verifica se a linha pertence ao equipamento clicado via nomenclatura principal ou macro
                const matchPressao = nomenclatura && (vrpCsv === nomenclatura || tagCsv === nomenclatura);
                const matchVazao = nomMacro && (vrpCsv === nomMacro || tagCsv === nomMacro);

                if (matchPressao || matchVazao) {
                    if (!groupedData[tempo]) {
                        groupedData[tempo] = { montante: null, jusante: null, vazao: null };
                    }

                    if (caracteristica.includes('Montante') && matchPressao) {
                        groupedData[tempo].montante = valor;
                    } else if (caracteristica.includes('Jusante') && matchPressao) {
                        groupedData[tempo].jusante = valor;
                    } else if (caracteristica.includes('Vazão')) {
                        // Se for vazão, salva se vier do matchVazao OU se a tag principal tiver vazão
                        if (matchVazao || matchPressao) {
                            groupedData[tempo].vazao = valor;
                        }
                    }
                }
            }

            // Ordenar os tempos cronologicamente
            const sortedTimes = Object.keys(groupedData).sort();
            
            const labels = [];
            const dataMontante = [];
            const dataJusante = [];
            const dataVazao = [];

            sortedTimes.forEach(tempo => {
                const d = new Date(tempo);
                const lbl = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                
                labels.push(lbl);
                dataMontante.push(groupedData[tempo].montante);
                dataJusante.push(groupedData[tempo].jusante);
                dataVazao.push(groupedData[tempo].vazao);
            });

            if (labels.length > 0) {
                // Monta um título combinado caso tenha as duas referências
                let titleParts = [];
                if (nomenclatura) titleParts.push(nomenclatura);
                if (nomMacro && nomMacro !== nomenclatura) titleParts.push(nomMacro);
                
                lastChartData = { 
                    labels, 
                    montante: dataMontante, 
                    jusante: dataJusante, 
                    vazao: dataVazao, 
                    title: titleParts.join(' / ') 
                };
                renderizarCanvas('pressureChart', lastChartData);
                chartSection.style.display = 'block';
            } else {
                chartSection.style.display = 'none';
                lastChartData = null;
            }
        } catch (error) {
            console.error("Erro no gráfico:", error);
            chartSection.style.display = 'none';
        }
    }

    function renderizarCanvas(canvasId, chartData, isExpanded = false) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        
        // Define quais datasets vamos mostrar baseado no que tem dados
        const datasets = [];
        const hasPressao = chartData.montante.some(v => v !== null) || chartData.jusante.some(v => v !== null);
        const hasVazao = chartData.vazao && chartData.vazao.some(v => v !== null);
        
        if (chartData.montante.some(v => v !== null)) {
            datasets.push({
                label: 'Montante',
                data: chartData.montante,
                yAxisID: 'y', // Mesmo eixo para todos
                borderColor: '#0056b3',
                backgroundColor: 'rgba(0, 86, 179, 0.08)',
                borderWidth: isExpanded ? 3 : 2,
                pointRadius: isExpanded ? 3 : 0,
                tension: 0.3,
                fill: true
            });
        }

        if (chartData.jusante.some(v => v !== null)) {
            datasets.push({
                label: 'Jusante',
                data: chartData.jusante,
                yAxisID: 'y', // Mesmo eixo para todos
                borderColor: '#ff4d4d',
                backgroundColor: 'rgba(255, 77, 77, 0.08)',
                borderWidth: isExpanded ? 3 : 2,
                pointRadius: isExpanded ? 3 : 0,
                tension: 0.3,
                fill: true
            });
        }

        // Caso o equipamento tenha dados de Vazão
        if (hasVazao) {
            datasets.push({
                label: 'Vazão',
                data: chartData.vazao,
                yAxisID: 'y', // Mantém no mesmo eixo
                borderColor: '#2e7d32',
                backgroundColor: 'rgba(46, 125, 50, 0.08)',
                borderWidth: isExpanded ? 3 : 2,
                pointRadius: isExpanded ? 3 : 0,
                tension: 0.3,
                fill: true
            });
        }

        const config = {
            type: 'line',
            data: {
                labels: chartData.labels,
                datasets: datasets
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { intersect: false, mode: 'index' },
                scales: {
                    x: { 
                        ticks: { maxTicksLimit: isExpanded ? 20 : 6, font: { size: 10 } } 
                    },
                    y: { 
                        type: 'linear',
                        display: true,
                        position: 'left',
                        beginAtZero: true, 
                        // Título genérico já que comporta ambas as grandezas
                        title: { display: true, text: 'Valor', font: { weight: 'bold' } } 
                    }
                },
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        };

        if (isExpanded) {
            if (expandedChart) expandedChart.destroy();
            expandedChart = new Chart(ctx, config);
        } else {
            if (currentChart) currentChart.destroy();
            currentChart = new Chart(ctx, config);
        }
    }

    // --- MODAL E DOWNLOAD ---

    function abrirModalGrafico() {
        if (!lastChartData) return;
        document.getElementById('modal-title').innerText = `Histórico Detalhado: ${lastChartData.title}`;
        modal.style.display = 'flex';
        setTimeout(() => {
            renderizarCanvas('expandedChart', lastChartData, true);
        }, 100);
    }

    function fecharModalGrafico() { modal.style.display = 'none'; }

    function baixarGrafico(fromModal = false) {
        if (!lastChartData) return;
        const canvas = document.getElementById(fromModal ? 'expandedChart' : 'pressureChart');
        const link = document.createElement('a');
        // Nome de arquivo higienizado
        const cleanTitle = (lastChartData.title || 'equipamento').replace(/[^a-zA-Z0-9.-]/g, '_');
        link.download = `dados_${cleanTitle}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    // --- MAPA E INTERAÇÃO ---

    function carregarSVG() {
        fetch(svgFileName)
            .then(res => res.text())
            .then(svgData => {
                svgWrapper.innerHTML = svgData;
                ajustarTamanhoInicial();
                updateTransform();
                ativarInteratividade();
            })
            .catch(err => {
                console.error("Erro a carregar SVG", err);
                document.getElementById('loading-text').innerText = "Erro ao carregar o mapa SVG.";
            });
    }

    function ativarInteratividade() {
        document.querySelectorAll('.interactive-element').forEach(el => {
            el.addEventListener('click', (e) => {
                removerDestaques();
                e.stopPropagation();

                const data = el.dataset;
                const equip = data.equipamento;
                const nom = data.nomenclatura || data.id;
                const nomVrp = data.nomenclaturaVrp;
                const nomMacro = data.nomenclaturaMacro; // Puxa o nome do macromedidor para vazão

                destacarConexoesEmCadeia(el);

                // Cabeçalho
                document.getElementById('item-nome').innerText = data.nome || equip || 'Desconhecido';
                document.getElementById('item-id').innerText = nom || 'N/A';

                // Lógica da Foto
                if (data.imagem) {
                    imgElement.src = data.imagem;
                    imgContainer.style.display = 'block';
                } else {
                    imgContainer.style.display = 'none';
                    imgElement.src = '';
                }

                // Status
                const statusEl = document.getElementById('item-status');
                if (data.status) {
                    statusEl.style.display = 'inline-block';
                    statusEl.innerText = data.status;
                    statusEl.style.background = (data.status.includes('Oper') || data.status.includes('Normal')) ? '#e8f5e9' : '#fff3e0';
                    statusEl.style.color = (data.status.includes('Oper') || data.status.includes('Normal')) ? '#2e7d32' : '#e65100';
                } else {
                    statusEl.style.display = 'none';
                }

                // Campos Dinâmicos
                const campos = document.getElementById('campos-dinamicos');
                let html = '';
                const add = (l, v) => v ? html += `<div class="data-row"><div class="data-label">${l}</div><div class="data-value">${v}</div></div>` : null;

                if (equip?.includes('VRP')) {
                    add('Diâmetro', data.diametro);
                    add('Pressão Montante', data.pressaoMontante);
                    add('Pressão Jusante', data.pressaoJusante);
                    add('Nº Ligações', data.ligacoes);
                } else if (equip === 'Reservatório') {
                    add('Sistema', data.sistema);
                    add('Volume Total', data.volumeTotal);
                    add('Volume Operação', data.volumeOperacao);
                } else if (equip === 'Booster') {
                    add('Pressão Jusante', data.pressaoJusante);
                }

                campos.innerHTML = html;
                panel.classList.add('active');

                // Atualiza o gráfico se existir alguma nomenclatura atrelada a esse componente
                const targetNom = nomVrp || nom;
                if (targetNom || nomMacro) {
                    atualizarGrafico(targetNom, nomMacro);
                } else {
                    chartSection.style.display = 'none';
                }
            });
        });
    }

    function ajustarTamanhoInicial() {
        const rect = svgViewport.getBoundingClientRect();
        scale = 0.4;
        updateTransform();
    }

    function updateTransform() {
        svgWrapper.style.transform = `translate(-50%, -50%) translate(${lastTranslateXPx}px, ${lastTranslateYPx}px) scale(${scale})`;
    }

    function closePanel() {
        panel.classList.remove('active');
        removerDestaques();
    }

    function removerDestaques() {
        document.querySelectorAll('.highlight-blink').forEach(el => el.classList.remove('highlight-blink'));
    }

    // Zoom e Arraste
    svgViewport.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        isDragging = true;
        svgViewport.classList.add('dragging');
        startX = e.clientX; startY = e.clientY;
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        lastTranslateXPx += e.clientX - startX;
        lastTranslateYPx += e.clientY - startY;
        startX = e.clientX; startY = e.clientY;
        updateTransform();
    });

    window.addEventListener('mouseup', () => { isDragging = false; svgViewport.classList.remove('dragging'); });

    svgViewport.addEventListener('wheel', (e) => {
        e.preventDefault();
        const factor = Math.exp(-e.deltaY * 0.001);
        scale = Math.min(Math.max(scale * factor, 0.05), 10);
        updateTransform();
    }, { passive: false });

    function destacarConexoesEmCadeia(el) {
        const id = el.dataset.nomenclatura || el.dataset.id;
        if (!id) return;
        const visitados = new Set();
        const fila = [id];
        while (fila.length > 0) {
            const curr = fila.shift();
            if (visitados.has(curr)) continue;
            visitados.add(curr);
            const found = document.querySelector(`[data-nomenclatura="${curr}"], [data-id="${curr}"]`);
            if (found) {
                if (found !== el) found.classList.add('highlight-blink');
                const raw = found.dataset.conexoes || found.dataset.vrpsConectadas || '';
                raw.split(',').map(s => s.trim()).filter(Boolean).forEach(c => fila.push(c));
            }
        }
    }

    window.onload = carregarSVG;
    window.onclick = (e) => { if (e.target == modal) fecharModalGrafico(); }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas Isolados - Interativo</title>
    <!-- Inclusão da biblioteca Chart.js para os gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #map-container {
            flex: 1;
            position: relative;
            background-color: #e9ecef;
            overflow: hidden;
            min-width: 0;
        }

        #svg-viewport {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            cursor: grab;
            user-select: none;
            touch-action: none;
        }

        #svg-viewport.dragging {
            cursor: grabbing;
        }

        #svg-wrapper {
            position: absolute;
            left: 50%;
            top: 50%;
            will-change: transform;
        }

        #svg-wrapper svg {
            display: block;
            background: white;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.1);
            max-width: none;
            max-height: none;
            overflow: visible;
        }

        #loading-text {
            margin: 0;
            transform: translate(-50%, -50%);
            position: absolute;
            top: 50%;
            left: 50%;
            color: #666;
            font-size: 16px;
        }

        .interactive-element {
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .interactive-element:hover {
            filter: drop-shadow(2px 4px 6px rgba(0, 86, 179, 0.6)) brightness(0.85);
        }

        #info-panel {
            width: 350px;
            max-width: min(350px, 95vw);
            background: var(--card-bg);
            border-left: 2px solid #ddd;
            padding: 20px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.35s ease;
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            z-index: 10;
            overflow-y: auto;
        }

        #info-panel.active {
            transform: translateX(0);
        }

        .panel-header {
            border-bottom: 2px solid var(--primary-color);
            margin-bottom: 15px;
            padding-bottom: 10px;
        }

        .panel-header h2 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--primary-color);
        }

        .data-row {
            margin-bottom: 12px;
        }

        .data-label {
            font-size: 0.75rem;
            color: #666;
            font-weight: bold;
        }

        .data-value {
            font-size: 0.95rem;
            color: var(--text-color);
            margin-top: 2px;
            word-break: break-word;
        }

        .close-btn {
            align-self: flex-end;
            background: #eee;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-top: 5px;
        }

        /* Estilo para o container do gráfico */
        #chart-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            display: none;
        }

        #chart-section h3 {
            font-size: 0.9rem;
            margin-bottom: 10px;
            color: #555;
        }

        #image-container {
            width: 100%;
            height: 180px;
            background-color: #eee;
            overflow: hidden;
            display: none;
            border-radius: 8px;
            margin-top: 15px;
        }

        #item-imagem {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes blinker {
            50% { opacity: 0.4; fill: #ff4d4d; }
        }

        .highlight-blink {
            animation: blinker 0.8s ease-in-out infinite;
            stroke: #ff0000 !important;
            stroke-width: 3px !important;
        }

        .error-box {
            color: #b00020;
            background: #ffe8e8;
            border: 1px solid #ffb3b3;
            padding: 16px;
            margin: 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div id="map-container">
    <div id="svg-viewport">
        <div id="svg-wrapper">
            <p id="loading-text">A carregar o mapa e dados...</p>
        </div>
    </div>
</div>

<div id="info-panel">
    <button class="close-btn" onclick="closePanel()">Fechar ✕</button>

    <div class="panel-header">
        <h2 id="item-nome">Componente</h2>
        <span id="item-status" class="status-badge">Status</span>
    </div>

    <div class="data-row">
        <div class="data-label">Nomenclatura</div>
        <div id="item-id" class="data-value">-</div>
    </div>

    <div id="campos-dinamicos"></div>

    <!-- Seção do Gráfico -->
    <div id="chart-section">
        <h3>Histórico de Pressões (Semana)</h3>
        <canvas id="pressureChart"></canvas>
    </div>

    <div id="image-container">
        <img id="item-imagem" src="" alt="Foto do Equipamento">
    </div>
</div>

<script>
    const panel = document.getElementById('info-panel');
    const svgWrapper = document.getElementById('svg-wrapper');
    const svgViewport = document.getElementById('svg-viewport');
    const chartSection = document.getElementById('chart-section');
    
    const svgFileName = 'VCP2 1.svg';
    const csvFileName = 'media_pressoes_ultima_semana.csv';

    let scale = 1;
    let minScale = 0.1;
    let maxScale = 5;
    let isDragging = false;
    let startX = 0;
    let startY = 0;
    let lastTranslateXPx = 0;
    let lastTranslateYPx = 0;
    
    let currentChart = null;

    // --- FUNÇÕES DE DADOS (CSV e GRÁFICO) ---

    async function atualizarGrafico(nomenclatura) {
        if (!nomenclatura) return;

        try {
            const response = await fetch(csvFileName);
            if (!response.ok) throw new Error("Erro ao carregar CSV");
            
            const text = await response.text();
            const lines = text.split('\n');
            
            const labels = [];
            const dataMontante = [];
            const dataJusante = [];

            // Pular cabeçalho e iterar
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const cols = line.split(';'); // Delimitador ;
                if (cols.length < 5) continue;

                const tagCsv = cols[0].trim();
                const vrpCsv = cols[1].trim();
                const caracteristica = cols[2].trim();
                const tempo = cols[3].trim();
                const valor = parseFloat(cols[4].replace(',', '.'));

                // Filtramos se o identificador enviado (nomenclatura ou nomenclaturaVrp) bate com o VRP ou TAG do CSV
                if (vrpCsv === nomenclatura || tagCsv === nomenclatura) {
                    const dataObj = new Date(tempo);
                    
                    // Formatação dd/mm hh:mm
                    const dia = String(dataObj.getDate()).padStart(2, '0');
                    const mes = String(dataObj.getMonth() + 1).padStart(2, '0');
                    const horas = String(dataObj.getHours()).padStart(2, '0');
                    const minutos = String(dataObj.getMinutes()).padStart(2, '0');
                    
                    const labelFormatado = `${dia}/${mes} ${horas}:${minutos}`;
                    
                    if (!labels.includes(labelFormatado)) {
                        labels.push(labelFormatado);
                    }

                    if (caracteristica === 'Montante') {
                        dataMontante.push(valor);
                    } else if (caracteristica === 'Jusante') {
                        dataJusante.push(valor);
                    }
                }
            }

            if (labels.length > 0) {
                renderizarCanvas(labels, dataMontante, dataJusante);
                chartSection.style.display = 'block';
            } else {
                chartSection.style.display = 'none';
            }

        } catch (error) {
            console.error("Erro no gráfico:", error);
            chartSection.style.display = 'none';
        }
    }

    function renderizarCanvas(labels, montante, jusante) {
        const ctx = document.getElementById('pressureChart').getContext('2d');
        
        if (currentChart) {
            currentChart.destroy();
        }

        currentChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Montante',
                        data: montante,
                        borderColor: '#0056b3',
                        backgroundColor: 'rgba(0, 86, 179, 0.1)',
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0.3,
                        fill: true
                    },
                    {
                        label: 'Jusante',
                        data: jusante,
                        borderColor: '#ff4d4d',
                        backgroundColor: 'rgba(255, 77, 77, 0.1)',
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0.3,
                        fill: true
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                interaction: {
                    intersect: false,
                    mode: 'index',
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        title: { display: true, text: 'mca' }
                    },
                    x: {
                        ticks: {
                            maxTicksLimit: 6,
                            font: { size: 10 }
                        }
                    }
                },
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { boxWidth: 12, font: { size: 11 } }
                    }
                }
            }
        });
    }

    // --- LÓGICA DO MAPA E INTERAÇÃO ---

    function carregarSVG() {
        fetch(svgFileName)
            .then(response => {
                if (!response.ok) throw new Error(`Arquivo não encontrado`);
                return response.text();
            })
            .then(svgData => {
                svgWrapper.innerHTML = svgData;
                ajustarTamanhoInicial();
                updateTransform();
                ativarInteratividade();
            })
            .catch(error => {
                console.error(error);
                svgWrapper.innerHTML = `<div class="error-box">Erro ao carregar mapa: ${svgFileName}</div>`;
            });
    }

    function ativarInteratividade() {
        const elements = document.querySelectorAll('.interactive-element');

        elements.forEach(el => {
            el.addEventListener('click', (event) => {
                removerDestaques();
                event.stopPropagation();

                const data = el.dataset;
                const equipamento = data.equipamento;
                
                // Prioridades de identificação
                const nomenclatura = data.nomenclatura || data.id;
                const nomenclaturaVrp = data.nomenclaturaVrp; // Pega o atributo data-nomenclatura-vrp

                destacarConexoesEmCadeia(el);

                // Preencher painel principal
                document.getElementById('item-nome').innerText = data.nome || equipamento || 'Desconhecido';
                document.getElementById('item-id').innerText = nomenclatura || 'N/A';

                // Foto
                const imgContainer = document.getElementById('image-container');
                const imgElement = document.getElementById('item-imagem');
                if (data.imagem) {
                    imgElement.src = data.imagem;
                    imgContainer.style.display = 'block';
                } else {
                    imgContainer.style.display = 'none';
                }

                // Status
                const statusEl = document.getElementById('item-status');
                if (data.status) {
                    statusEl.style.display = 'inline-block';
                    statusEl.innerText = data.status;
                    statusEl.style.background = (data.status.includes('Oper') || data.status.includes('Normal')) ? '#e8f5e9' : '#fff3e0';
                    statusEl.style.color = (data.status.includes('Oper') || data.status.includes('Normal')) ? '#2e7d32' : '#e65100';
                } else {
                    statusEl.style.display = 'none';
                }

                // Campos Dinâmicos
                const camposDinamicos = document.getElementById('campos-dinamicos');
                let htmlCampos = '';
                const add = (l, v) => v ? htmlCampos += `<div class="data-row"><div class="data-label">${l}</div><div class="data-value">${v}</div></div>` : null;

                if (equipamento?.includes('VRP')) {
                    add('Diâmetro', data.diametro);
                    add('Pressão Montante', data.pressaoMontante);
                    add('Pressão Jusante', data.pressaoJusante);
                    add('Nº de Ligações', data.ligacoes);
                    
                    // Lógica do Gráfico: Prioriza nomenclaturaVrp se disponível, senão usa nomenclatura comum
                    const idParaGrafico = nomenclaturaVrp || nomenclatura;
                    atualizarGrafico(idParaGrafico);
                    
                } else {
                    chartSection.style.display = 'none';
                    if (equipamento === 'Reservatório') {
                        add('Sistema', data.sistema);
                        add('Volume Total', data.volumeTotal);
                        add('Volume Operação', data.volumeOperacao);
                    } else if (equipamento === 'Booster') {
                        add('Pressão Jusante', data.pressaoJusante);
                    }
                }

                camposDinamicos.innerHTML = htmlCampos;
                panel.classList.add('active');
            });
        });

        document.querySelector('#svg-wrapper svg')?.addEventListener('click', (e) => {
            if (!e.target.closest('.interactive-element')) closePanel();
        });
    }

    // --- CONTROLES DE ZOOM E PAN ---

    function ajustarTamanhoInicial() {
        const svgElement = svgWrapper.querySelector('svg');
        if (!svgElement) return;
        const viewBox = svgElement.viewBox?.baseVal || { width: 3100, height: 3000 };
        const rect = svgViewport.getBoundingClientRect();
        scale = Math.min(rect.width / viewBox.width, rect.height / viewBox.height, 1);
        lastTranslateXPx = 0; lastTranslateYPx = 0;
    }

    function updateTransform() {
        svgWrapper.style.transform = `translate(-50%, -50%) translate(${lastTranslateXPx}px, ${lastTranslateYPx}px) scale(${scale})`;
    }

    function removerDestaques() {
        document.querySelectorAll('.highlight-blink').forEach(el => el.classList.remove('highlight-blink'));
    }

    function closePanel() {
        panel.classList.remove('active');
        removerDestaques();
    }

    svgViewport.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        isDragging = true;
        svgViewport.classList.add('dragging');
        startX = e.clientX; startY = e.clientY;
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        lastTranslateXPx += e.clientX - startX;
        lastTranslateYPx += e.clientY - startY;
        startX = e.clientX; startY = e.clientY;
        updateTransform();
    });

    window.addEventListener('mouseup', () => { isDragging = false; svgViewport.classList.remove('dragging'); });

    svgViewport.addEventListener('wheel', (e) => {
        e.preventDefault();
        const factor = Math.exp(-e.deltaY * 0.001);
        const newScale = Math.min(Math.max(scale * factor, 0.05), 10);
        if (newScale !== scale) {
            scale = newScale;
            updateTransform();
        }
    }, { passive: false });

    function destacarConexoesEmCadeia(el) {
        const id = el.dataset.nomenclatura || el.dataset.id;
        if (!id) return;
        const visitados = new Set();
        const fila = [id];
        while (fila.length > 0) {
            const currId = fila.shift();
            if (visitados.has(currId)) continue;
            visitados.add(currId);
            const found = document.querySelector(`[data-nomenclatura="${currId}"], [data-id="${currId}"]`);
            if (found) {
                if (found !== el) found.classList.add('highlight-blink');
                const raw = found.dataset.conexoes || found.dataset.vrpsConectadas || found.dataset.vrps_conectadas || '';
                raw.split(',').map(s => s.trim()).filter(Boolean).forEach(c => fila.push(c));
            }
        }
    }

    window.onload = carregarSVG;
</script>

</body>
</html>

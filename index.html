<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas Isolados - Interativo</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Contentor onde o SVG será injetado */
        #map-container {
            flex: 1;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-color: #e9ecef;
            overflow: auto; /* Permite rolar se o mapa for muito grande */
        }

        /* O SVG carregado vai herdar isso */
        #map-container svg {
            max-width: 100%;
            max-height: 90vh;
            background: white;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.1);
        }

        /* Estilo para elementos clicáveis do Inkscape */
        .interactive-element {
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            /* A linha 'transform-origin: center;' foi removida daqui para evitar que os objetos do SVG mudem de lugar */
        }

        .interactive-element:hover {
            filter: drop-shadow(2px 4px 6px rgba(0, 86, 179, 0.6)) brightness(0.85);
        }

        .interactive-element text {
            user-select: none;
            pointer-events: none; 
        }

        /* Painel Lateral */
        #info-panel {
            width: 320px;
            background: var(--card-bg);
            border-left: 2px solid #ddd;
            padding: 25px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            z-index: 10;
            overflow-y: auto;
        }

        #info-panel.active {
            transform: translateX(0);
        }

        .panel-header {
            border-bottom: 2px solid var(--primary-color);
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .panel-header h2 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--primary-color);
        }

        .data-row { margin-bottom: 15px; }
        .data-label { font-size: 0.8rem; color: #666; font-weight: bold; }
        .data-value { font-size: 1rem; color: var(--text-color); margin-top: 3px; }
        
        .close-btn {
            align-self: flex-end;
            background: #eee;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .close-btn:hover { background: #ddd; }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-top: 5px;
        }
         /* Estilização da Imagem */
        #image-container {
            width: 100%;
            height: 200px;
            background-color: #eee;
            overflow: hidden;
            display: none; /* Escondido por padrão */
            border-bottom: 1px solid #ddd;
        }

        #item-imagem {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Faz a imagem preencher o espaço sem distorcer */
            display: block;
        }
    </style>
</head>
<body>

<div id="map-container">
    <p id="loading-text">A carregar o mapa...</p>
</div>

<div id="info-panel">
    <!-- Espaço reservado para a foto -->
    
    <button class="close-btn" onclick="closePanel()">Fechar ✕</button>
    
    <div class="panel-header">
        <h2 id="item-nome">Componente</h2>
        <span id="item-status" class="status-badge">Status</span>
    </div>

    

    <div class="data-row">
        <div class="data-label">Nomenclatura</div>
        <div id="item-id" class="data-value">-</div>
    </div>
    
    <!-- ESPAÇO MÁGICO: O JavaScript vai criar os campos dinamicamente aqui dentro -->
    <div id="campos-dinamicos"></div>
    <div id="image-container">
        <img id="item-imagem" src="" alt="Foto do Equipamento">
    </div>
</div>

<script>
    const panel = document.getElementById('info-panel');
    const mapContainer = document.getElementById('map-container');

    // NOME DO SEU ARQUIVO SVG EXATO NO GITHUB
    const svgFileName = 'TAQUARI 1.svg';

    // 1. Carregar o SVG externamente
    fetch(svgFileName)
        .then(response => {
            if (!response.ok) throw new Error('Falha ao carregar o SVG');
            return response.text();
        })
        .then(svgData => {
            // 2. Injetar o SVG no HTML
            mapContainer.innerHTML = svgData;
            
            // 3. Ativar a interatividade agora que o SVG existe na tela
            ativarInteratividade();
        })
        .catch(error => {
            mapContainer.innerHTML = `<p style="color:red;">Erro ao carregar o mapa: Verifique se o arquivo '${svgFileName}' está na mesma pasta e se você está usando um servidor local.</p>`;
            console.error(error);
        });

    function ativarInteratividade() {
        const elements = document.querySelectorAll('.interactive-element');

        elements.forEach(el => {
            el.addEventListener('click', (event) => {
                event.stopPropagation();
                
                const data = el.dataset;
                const equipamento = data.equipamento;
                
                // Preenche o Cabeçalho Padrão com os novos atributos definidos
                document.getElementById('item-nome').innerText = data.equipamento || 'Desconhecido';
                document.getElementById('item-id').innerText = data.nomenclatura || 'N/A';
                
                // Trata a Imagem do Equipamento
                const imgContainer = document.getElementById('image-container');
                const imgElement = document.getElementById('item-imagem');
                
                if (data.imagem) {
                    imgElement.src = data.imagem;
                    imgContainer.style.display = 'block'; // Mostra a imagem
                } else {
                    imgElement.src = '';
                    imgContainer.style.display = 'none'; // Esconde se não tiver foto
                }

                // Trata o Badge de Status
                const statusEl = document.getElementById('item-status');
                if (data.status) {
                    statusEl.style.display = 'inline-block';
                    statusEl.innerText = data.status;
                    
                    // Adicionado 'Em funcionamento' às opções com cor verde
                    if(data.status === 'Operacional' || data.status === 'Normal' || data.status === 'Em funcionamento' || data.status === 'Em operação') {
                        statusEl.style.background = '#e8f5e9'; statusEl.style.color = '#2e7d32';
                    } else if (data.status === 'Atenção' || data.status === 'Alerta' || data.status === 'Alerta de Pressão') {
                        statusEl.style.background = '#fff3e0'; statusEl.style.color = '#e65100';
                    } else {
                        statusEl.style.background = '#e1f5fe'; statusEl.style.color = '#01579b';
                    }
                } else {
                    statusEl.style.display = 'none'; 
                }

                // ========================================================
                // A MÁGICA: Gera campos baseados no tipo de Equipamento
                // ========================================================
                const camposDinamicos = document.getElementById('campos-dinamicos');
                let htmlCampos = '';

                function adicionarCampo(label, valor) {
                    if (valor !== undefined && valor !== '') {
                        htmlCampos += `
                            <div class="data-row">
                                <div class="data-label">${label}</div>
                                <div class="data-value">${valor}</div>
                            </div>`;
                    }
                }

                if (equipamento === 'Reservatório') {
                    adicionarCampo('ETA', data.eta);
                    adicionarCampo('Sistema', data.sistema);
                    adicionarCampo('VRP Abrangidas', data.vrpAbrangidas);
                    adicionarCampo('Volume total (m³)', data.volumeTotal);
                    adicionarCampo('Volume em operação (m³)', data.volumeOperacao);
                    adicionarCampo('Vazão saída (l/s)', data.vazaoSaida);
                    adicionarCampo('Área de Abrangência', data.areaAbrangencia);

                } else if (equipamento === 'VRP') {
                    adicionarCampo('Diâmetro', data.diametro);
                    adicionarCampo('Pressão Montante', data.pressaoMontante);
                    adicionarCampo('Pressão Jusante', data.pressaoJusante);
                    adicionarCampo("Daynight", data.daynight);
                    adicionarCampo('Nº de Ligações', data.ligacoes);
                    adicionarCampo('VRPS Conectadas', data.vrpsConectadas);

                } else if (equipamento === 'VRP/Macro') {
                    adicionarCampo('VRP', data.nomenclaturaVrp);
                    adicionarCampo('Macro', data.nomenclaturaMacro);
                    adicionarCampo('Diâmetro', data.diametro);
                    adicionarCampo('Pressão Montante', data.pressaoMontante);
                    adicionarCampo('Pressão Jusante', data.pressaoJusante);
                    adicionarCampo("Daynight", data.daynight);
                    adicionarCampo('Vazão Jusante', data.vazaoJusante);
                    adicionarCampo('Nº de Ligações', data.ligacoes);
                    adicionarCampo('VRPS Conectadas', data.vrpsConectadas);

                } else if (equipamento === 'Booster') {
                    adicionarCampo('Diâmetro', data.diametro);
                    adicionarCampo('Nº Ligações', data.ligacoes);
                    adicionarCampo('Pressão Jusante', data.pressaoJusante);

                } else {
                    // Fallback (caso não tenha o atributo data-equipamento)
                    adicionarCampo('Capacidade Máxima', data.capacidade);
                    adicionarCampo('Pressão Atual', data.pressao);
                    adicionarCampo('Data de Instalação', data.instalacao);
                    adicionarCampo('Vazão Atual', data.vazao);
                    adicionarCampo('Última Manutenção', data.ultimaManutencao);
                }

                camposDinamicos.innerHTML = htmlCampos;
                panel.classList.add('active');
            });
        });

        // Fechar ao clicar fora
        const svgElement = document.querySelector('svg');
        if(svgElement) {
            svgElement.addEventListener('click', (e) => {
                if(!e.target.closest('.interactive-element')) {
                    closePanel();
                }
            });
        }
    }

    function closePanel() {
        panel.classList.remove('active');
    }
</script>

</body>
</html>

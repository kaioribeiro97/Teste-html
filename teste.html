<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas Isolados - Interativo</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Contentor onde o SVG será injetado */
        #map-container {
            flex: 1;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-color: #e9ecef;
            overflow: auto; /* Permite rolar se o mapa for muito grande */
        }

        /* O SVG carregado vai herdar isso */
        #map-container svg {
            max-width: 100%;
            max-height: 90vh;
            background: white;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.1);
        }

        /* Estilo para elementos clicáveis do Inkscape */
        .interactive-element {
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            transform-origin: center;
        }

        .interactive-element:hover {
            filter: drop-shadow(2px 4px 6px rgba(0, 86, 179, 0.6)) brightness(0.85);
        }

        .interactive-element text {
            user-select: none;
            pointer-events: none; 
        }

        /* Painel Lateral */
        #info-panel {
            width: 320px;
            background: var(--card-bg);
            border-left: 2px solid #ddd;
            padding: 25px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            z-index: 10;
        }

        #info-panel.active {
            transform: translateX(0);
        }

        .panel-header {
            border-bottom: 2px solid var(--primary-color);
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .panel-header h2 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--primary-color);
        }

        .data-row { margin-bottom: 15px; }
        .data-label { font-size: 0.8rem; color: #666; font-weight: bold; }
        .data-value { font-size: 1rem; color: var(--text-color); margin-top: 3px; }
        
        .close-btn {
            align-self: flex-end;
            background: #eee;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .close-btn:hover { background: #ddd; }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div id="map-container">
    <p id="loading-text">A carregar o mapa...</p>
</div>

<div id="info-panel">
    <button class="close-btn" onclick="closePanel()">Fechar ✕</button>
    <div class="panel-header">
        <h2 id="item-nome">Componente</h2>
        <span id="item-status" class="status-badge">Status</span>
    </div>
    
    <div class="data-row">
        <div class="data-label">ID Técnico</div>
        <div id="item-id" class="data-value">-</div>
    </div>
    <div class="data-row">
        <div class="data-label">Vazão Atual</div>
        <div id="item-vazao" class="data-value">-</div>
    </div>
    <div class="data-row">
        <div class="data-label">Última Manutenção</div>
        <div id="item-manutencao" class="data-value">-</div>
    </div>
    <div class="data-row">
        <div class="data-label">Inscrições Atendidas</div>
        <div id="item-inscricoes" class="data-value">-</div>
    </div>
</div>

<script>
    const panel = document.getElementById('info-panel');
    const mapContainer = document.getElementById('map-container');

    // NOME DO SEU ARQUIVO SVG EXATO
    const svgFileName = 'SISTEMAS ISOLADOS - R01 (1).svg';

    // 1. Carregar o SVG externamente
    fetch(svgFileName)
        .then(response => {
            if (!response.ok) throw new Error('Falha ao carregar o SVG');
            return response.text();
        })
        .then(svgData => {
            // 2. Injetar o SVG no HTML
            mapContainer.innerHTML = svgData;
            
            // 3. Ativar a interatividade agora que o SVG existe na tela
            ativarInteratividade();
        })
        .catch(error => {
            mapContainer.innerHTML = `<p style="color:red;">Erro ao carregar o mapa: Verifique se o arquivo '${svgFileName}' está na mesma pasta e se você está usando um servidor local (Live Server).</p>`;
            console.error(error);
        });

    function ativarInteratividade() {
        const elements = document.querySelectorAll('.interactive-element');

        elements.forEach(el => {
            el.addEventListener('click', (event) => {
                event.stopPropagation();
                const data = el.dataset;
                
                document.getElementById('item-nome').innerText = data.nome || 'Desconhecido';
                document.getElementById('item-id').innerText = el.id || 'N/A';
                document.getElementById('item-vazao').innerText = data.vazao || '-';
                document.getElementById('item-manutencao').innerText = data.ultimaManutencao || '-';
                document.getElementById('item-inscricoes').innerText = data.itemInscricoes || '-';
                
                const statusEl = document.getElementById('item-status');
                statusEl.innerText = data.status || '-';
                
                if(data.status === 'Operacional' || data.status === 'Normal') {
                    statusEl.style.background = '#e8f5e9'; statusEl.style.color = '#2e7d32';
                } else if (data.status === 'Atenção' || data.status === 'Alerta') {
                    statusEl.style.background = '#fff3e0'; statusEl.style.color = '#e65100';
                } else {
                    statusEl.style.background = '#e1f5fe'; statusEl.style.color = '#01579b';
                }

                panel.classList.add('active');
            });
        });

        // Fechar ao clicar no fundo do SVG
        document.querySelector('svg').addEventListener('click', (e) => {
            if(!e.target.closest('.interactive-element')) {
                closePanel();
            }
        });
    }

    function closePanel() {
        panel.classList.remove('active');
    }
</script>

</body>
</html>
